<!-- Events Banner -->
<section class="events-banner" appScrollAnimate animationType="fadeInUp">
  <div class="events-banner-overlay"></div>
  <div class="events-banner-content">
    <div class="container">
      <div class="row">
        <div class="col-lg-12 text-center">
          <h1 class="events-banner-title">Our Events</h1>
          <p class="events-banner-subtitle">Discover upcoming events and activities</p>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
              <li class="breadcrumb-item"><a href="#">Home</a></li>
              <li class="breadcrumb-item active" aria-current="page">Events</li>
            </ol>
          </nav>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="events" class="events-section section-padding">
  <div class="container">
    <div class="text-center mb-5" appScrollAnimate animationType="fadeInUp" [animationDelay]="0">
      <h2 class="section-title">OUR EVENTS</h2>
      <p class="section-subtitle">Celebrating learning through engaging activities</p>
    </div>
    
    <div class="row">
      <div *ngFor="let event of events; let i = index" class="col-lg-4 col-md-6 mb-4" appScrollAnimate [animationType]="'fadeInUp'" [animationDelay]="0.1 * (i + 1)">
        <div class="event-card">
          <img [src]="event.image" [alt]="event.title" class="event-image">
          <div class="event-content">
            <div class="event-date">{{ event.date }}</div>
            <h3 class="event-title">{{ event.title }}</h3>
            <p class="event-description">{{ event.description }}</p>
            <button class="btn btn-primary">READ MORE</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
