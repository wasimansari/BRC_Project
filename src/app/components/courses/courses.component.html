<!-- Courses Banner -->
<section class="courses-banner" appScrollAnimate animationType="fadeInUp">
  <div class="courses-banner-overlay"></div>
  <div class="courses-banner-content">
    <div class="container">
      <div class="row">
        <div class="col-lg-12 text-center">
          <h1 class="courses-banner-title">Our Courses</h1>
          <p class="courses-banner-subtitle">Explore our most sought-after educational programs</p>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
              <li class="breadcrumb-item"><a href="#">Home</a></li>
              <li class="breadcrumb-item active" aria-current="page">Courses</li>
            </ol>
          </nav>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="courses" class="courses-section section-padding">
  <div class="container">
    <div class="text-center mb-5" appScrollAnimate animationType="fadeInUp" [animationDelay]="0">
      <h2 class="section-title">POPULAR COURSES</h2>
      <p class="section-subtitle">Expert-designed curriculum for your success</p>
    </div>
    
    <div class="row">
      <div *ngFor="let course of courses; let i = index" class="col-lg-4 col-md-6 mb-4" appScrollAnimate [animationType]="'fadeInUp'" [animationDelay]="0.1 * (i + 1)">
        <div class="course-card">
          <img [src]="course.image" [alt]="course.title" class="course-image">
          <div class="course-content">
            <h3 class="course-title">{{ course.title }}</h3>
            <p class="course-description">{{ course.description }}</p>
            <div class="course-rating">
              <i *ngFor="let star of getStars(course.rating)" [class]="star"></i>
              <span class="rating-text">({{ course.rating }})</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="text-center mt-5">
      <button class="btn btn-primary btn-lg">Browse all Courses</button>
    </div>
  </div>
</section>
